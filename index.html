<!DOCTYPE html>
<html lang="en">
<head>

<title>BLEEDBLUEARMY</title>

<!-- HLS.js -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root {
  --blue: #1e40af;
  --dark: #020617;
  --accent: #38bdf8;
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--dark);
  font-family: Arial, Helvetica, sans-serif;
  color: white;
}

/* Header */
header {
  text-align: center;
  padding: 12px;
  background: linear-gradient(90deg, #020617, var(--blue));
  font-weight: bold;
  letter-spacing: 2px;
  font-size: 18px;
}

/* Player */
.player-wrap {
  position: relative;
  width: 100%;
  background: black;
}

video {
  width: 100%;
  height: auto;
  background: black;
}

/* Watermark */
.watermark {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 12px;
  opacity: 0.7;
  background: rgba(0,0,0,0.6);
  padding: 5px 8px;
  border-radius: 6px;
}

/* Telegram Button */
.telegram {
  text-align: center;
  margin: 15px;
}

.telegram a {
  background: #229ED9;
  color: white;
  padding: 10px 22px;
  border-radius: 25px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(34,158,217,.6);
}
</style>
</head>
