<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>BLEEDBLUEARMY</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
      :root {
        --blue: #1e40af;
        --dark: #020617;
        --accent: #38bdf8;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
        background: linear-gradient(180deg, #020617, #020617, #000);
        color: white;
        padding: 10px;
      }

      .main-container {
        max-width: 600px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      /* VIDEO PLAYER RESPONSIVE */
      .player-wrap {
        position: relative;
        width: 100%;
        background: black;
        border-radius: 14px;
        overflow: hidden;
        padding-top: 56.25%;
        border-bottom: 2px solid #1e40af;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
      }

      .player-wrap video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      video {
        width: 100%;
        height: auto;
        display: block;
      }

      /* HEADER */
      header {
        background: linear-gradient(90deg, #020617, #1e3a8a, #020617);
        text-align: center;
        padding: 14px;
        font-size: 20px;
        font-weight: bold;
        letter-spacing: 2px;
        box-shadow: 0 3px 20px rgba(0, 0, 0, 0.6);
      }

      /* LIVE BADGE & WATERMARK */
      .live {
        position: absolute;
        top: 12px;
        left: 12px;
        background: red;
        padding: 5px 10px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: bold;
        box-shadow: 0 0 10px red;
        z-index: 10;
      }

      .watermark {
        position: absolute;
        top: 12px;
        right: 12px;
        font-size: 12px;
        opacity: 0.7;
        background: rgba(0, 0, 0, 0.6);
        padding: 5px 10px;
        border-radius: 6px;
        z-index: 10;
      }

      /* TELEGRAM BUTTON */
      .telegram {
        text-align: center;
        margin: 15px 0;
      }

      .telegram a {
        background: #229ed9;
        color: white;
        padding: 12px 26px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: bold;
        font-size: 15px;
        box-shadow: 0 0 15px rgba(34, 158, 217, 0.8);
        transition: 0.3s;
        display: inline-block;
      }

      .telegram a:hover {
        transform: scale(1.08);
      }

      /* COMMUNITY CARD SECTIONS */
      .card {
        background: linear-gradient(135deg, #0d6efd, #1a0ebd);
        border-radius: 14px;
        padding: 18px;
        color: #fff;
        text-align: center;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
      }

      .combined-sections {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
      }

      .combined-sections .card {
        flex: 1;
        min-width: 250px;
      }

      .community h3 {
        margin: 0 0 14px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        font-size: 16px;
        font-weight: 600;
      }

      .buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
      }

      .btn {
        flex: 1;
        background: transparent;
        border: 2px solid #fff;
        border-radius: 30px;
        padding: 10px;
        color: #fff;
        font-weight: 600;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: 0.3s;
      }

      .btn:hover {
        background: #fff;
        color: #0d6efd;
      }

      .btn svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }

      .share-btn {
        background: transparent;
        color: #fff;
        border: 2px solid #fff;
        border-radius: 30px;
        padding: 10px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: 0.3s;
        font-size: 14px;
      }

      .share-btn:hover {
        background: #fff;
        color: #0d6efd;
      }

      .photo-section {
        display: flex;
        justify-content: center;
        align-items: stretch;
        width: 100%;
        margin-top: 15px;
      }

      .photo-item {
        width: 100%;
        height: 250px;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
        transition: transform 0.3s;
        display: block;
      }

      .photo-item:hover {
        transform: scale(1.02);
      }

      .photo-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* POPUP */
      .popup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
      }

      .popup-box {
        background: #020617;
        padding: 25px;
        border-radius: 12px;
        text-align: center;
        max-width: 300px;
        width: 90%;
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.9);
        border: 1px solid #1e40af;
      }

      .popup-box h3 {
        margin-top: 0;
        font-size: 18px;
      }

      .popup-box p {
        font-size: 14px;
        margin: 10px 0;
      }

      .popup-btn {
        margin-top: 15px;
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .join {
        background: #229ed9;
        padding: 10px 20px;
        border: none;
        color: white;
        border-radius: 20px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        flex: 1;
        min-width: 100px;
      }

      .join:hover {
        background: #1a7fb8;
      }

      .cancel {
        background: #374151;
        padding: 10px 20px;
        border: none;
        color: white;
        border-radius: 20px;
        cursor: pointer;
        transition: 0.3s;
        flex: 1;
        min-width: 100px;
      }

      .cancel:hover {
        background: #4b5563;
      }

      /* RESPONSIVE DESIGN */
      @media (max-width: 768px) {
        .main-container {
          max-width: 100%;
          gap: 12px;
        }

        .card {
          padding: 16px;
        }

        header {
          font-size: 18px;
          padding: 12px;
        }

        .combined-sections {
          flex-direction: column;
          gap: 12px;
        }

        .combined-sections .card {
          flex: 1;
          min-width: unset;
        }

        .photo-item {
          height: 200px;
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 6px;
        }

        .main-container {
          gap: 10px;
        }

        .card {
          padding: 14px;
          border-radius: 10px;
        }

        header {
          font-size: 16px;
          padding: 10px;
          letter-spacing: 1px;
        }

        .community h3 {
          font-size: 14px;
          margin: 0 0 10px;
          gap: 6px;
        }

        .buttons {
          gap: 8px;
          flex-wrap: wrap;
        }

        .btn {
          padding: 8px;
          font-size: 12px;
          border-radius: 25px;
        }

        .btn svg {
          width: 16px;
          height: 16px;
        }

        .share-btn {
          padding: 8px;
          font-size: 12px;
          border-radius: 25px;
        }

        .telegram {
          margin: 10px 0;
        }

        .telegram a {
          padding: 10px 20px;
          font-size: 13px;
        }

        .live {
          font-size: 11px;
          padding: 4px 8px;
        }

        .watermark {
          font-size: 11px;
          padding: 4px 8px;
        }

        .photo-item {
          height: 180px;
          border-radius: 10px;
        }

        .popup-box {
          max-width: 90%;
          padding: 20px;
        }

        .popup-box h3 {
          font-size: 16px;
        }

        .popup-btn {
          flex-direction: column;
          gap: 8px;
        }

        .join,
        .cancel {
          width: 100%;
        }
      }

      @media (max-width: 360px) {
        .main-container {
          gap: 8px;
        }

        .card {
          padding: 12px;
          border-radius: 8px;
        }

        header {
          font-size: 14px;
          padding: 8px;
        }

        .community h3 {
          font-size: 13px;
          margin: 0 0 8px;
        }

        .btn {
          padding: 6px;
          font-size: 11px;
        }

        .share-btn {
          padding: 6px;
          font-size: 11px;
          border-radius: 20px;
        }

        .photo-item {
          height: 150px;
        }

        .telegram a {
          padding: 8px 16px;
          font-size: 12px;
        }
      }
    </style>
  </head>

  <body>

    <div class="main-container">

          autoplay
          muted

        <div class="live">LIVE</div>
        <div class="watermark">@BLEEDBLUEARMY</div>
      </div>

      <div class="combined-sections">
        <div class="card community">
          <h3>Join our community for live updates!</h3>
          <div class="buttons">

      </div>

      <div class="photo-section">

          href="#"
          class="photo-item"
          id="photoLink">
          <img

        </a>
      </div>
    </div>

    <!-- POPUP -->
    <div
      class="popup"
      id="popup">
      <div class="popup-box">
        <h3>Join BLEEDBLUEARMY</h3>
        <p>For match updates & backup links join our Telegram channel.</p>

        <div class="popup-btn">
          <button
            class="join"
            onclick="window.open('https://t.me/+_WN9XxoZT8QxZmI1')">
            Join
          </button>

          <button
            class="cancel"
            onclick="closePopup()">
            Cancel
          </button>
        </div>
      </div>
    </div>

  </body>
</html>
