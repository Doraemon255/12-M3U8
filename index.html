<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLEEDBLUEARMY</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

<style>
body {
    margin: 0;
    background: #000814;
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
}
header {
    padding: 12px;
    text-align: center;
    background: linear-gradient(90deg, #001d3d, #003566);
    font-weight: bold;
    letter-spacing: 2px;
}
video {
    width: 100%;
    height: auto;
    background: black;
}
.telegram {
    text-align: center;
    margin: 15px 0;
}
.telegram a {
    color: #fff;
    background: #229ED9;
    padding: 10px 20px;
    border-radius: 20px;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<header>BLEEDBLUEARMY</header>

<video id="video" controls autoplay muted></video>

<div class="telegram">
    <a href="https://t.me/+_WN9XxoZT8QxZmI1" target="_blank">
        Join Telegram Channel
    </a>
</div>

<script>
async function initPlayer() {
    if (!shaka.Player.isBrowserSupported()) {
        alert("Browser not supported");
        return;
    }

    const video = document.getElementById('video');
    const player = new shaka.Player(video);

    // ERROR HANDLING
    player.addEventListener('error', e => {
        console.error('Shaka Error', e.detail);
        alert("Stream Error: check MPD or Key");
    });

    // 👇👇 PUT YOUR MPD URL HERE 👇👇
    const mpdUrl = "https://otte.live.fly.ww.aiv-cdn.net/sin-nitro/live/clients/dash/enc/yqpb2usvdd/out/v1/ce95d81f287040d5a3fa6d4b145be849/cenc.mpd";

    // 👇👇 PUT YOUR CLEARKEY HERE 👇👇
    player.configure({
        drm: {
            clearKeys: {
                "baafdb8ebcbbc0655332291da6f121da": "60ac892e0ea0b2c46fc6837c97ed641a"
            }
        }
    });

    try {
        await player.load(mpdUrl);
        console.log("Stream loaded successfully");
    } catch (err) {
        console.error("Load failed", err);
    }
}

document.addEventListener('DOMContentLoaded', initPlayer);
</script>

</body>
</html>
