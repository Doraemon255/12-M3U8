<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLEEDBLUEARMY</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

:root{
--blue:#1e40af;
--dark:#020617;
--accent:#38bdf8;
}

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#020617,#020617,#000);
color:white;
}

/* HEADER */

header{
background:linear-gradient(90deg,#020617,#1e3a8a,#020617);
text-align:center;
padding:14px;
font-size:20px;
font-weight:bold;
letter-spacing:2px;
box-shadow:0 3px 20px rgba(0,0,0,.6);
}

/* PLAYER */

.player-wrap{
position:relative;
width:100%;
background:black;
border-bottom:2px solid #1e40af;
}

video{
width:100%;
height:auto;
}

/* LIVE BADGE */

.live{
position:absolute;
top:12px;
left:12px;
background:red;
padding:5px 10px;
border-radius:6px;
font-size:12px;
font-weight:bold;
box-shadow:0 0 10px red;
}

/* WATERMARK */

.watermark{
position:absolute;
top:12px;
right:12px;
font-size:12px;
opacity:.7;
background:rgba(0,0,0,.6);
padding:5px 10px;
border-radius:6px;
}

/* TELEGRAM BUTTON */

.telegram{
text-align:center;
margin:20px;
}

.telegram a{
background:#229ED9;
color:white;
padding:12px 26px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
font-size:15px;
box-shadow:0 0 15px rgba(34,158,217,.8);
transition:.3s;
}

.telegram a:hover{
transform:scale(1.08);
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.popup-box{
background:#020617;
padding:25px;
border-radius:12px;
text-align:center;
max-width:300px;
box-shadow:0 0 25px rgba(0,0,0,.9);
border:1px solid #1e40af;
}

.popup-box h3{
margin-top:0;
}

.popup-btn{
margin-top:15px;
}

.join{
background:#229ED9;
padding:10px 20px;
border:none;
color:white;
border-radius:20px;
font-weight:bold;
margin-right:10px;
}

.cancel{
background:#374151;
padding:10px 20px;
border:none;
color:white;
border-radius:20px;
}

</style>
</head>

<body>

<header>BLEEDBLUEARMY</header>

<div class="player-wrap">
<video id="video" controls autoplay muted playsinline></video>

<div class="live">LIVE</div>
<div class="watermark">@BLEEDBLUEARMY</div>
</div>

<div class="telegram">
<a href="https://t.me/+_WN9XxoZT8QxZmI1" target="_blank">
Join Telegram Channel
</a>
</div>

<div class="popup" id="popup">
<div class="popup-box">

<p>For match updates & backup links join our Telegram channel.</p>

<div class="popup-btn">

<button class="join"
onclick="window.open('https://t.me/+_WN9XxoZT8QxZmI1')">
Join
</button>

<button class="cancel"
onclick="closePopup()">
