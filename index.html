<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLEEDBLUEARMY</title>

<!-- HLS.js -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
:root {
  --blue: #1e40af;
  --dark: #020617;
  --accent: #38bdf8;
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--dark);
  font-family: Arial, Helvetica, sans-serif;
  color: white;
}

/* Header */
header {
  text-align: center;
  padding: 12px;
  background: linear-gradient(90deg, #020617, var(--blue));
  font-weight: bold;
  letter-spacing: 2px;
  font-size: 18px;
}

/* Player */
.player-wrap {
  position: relative;
  width: 100%;
  background: black;
}

video {
  width: 100%;
  height: auto;
  background: black;
}

/* Watermark */
.watermark {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 12px;
  opacity: 0.7;
  background: rgba(0,0,0,0.6);
  padding: 5px 8px;
  border-radius: 6px;
}

/* Telegram Button */
.telegram {
  text-align: center;
  margin: 15px;
}

.telegram a {
  background: #229ED9;
  color: white;
  padding: 10px 22px;
  border-radius: 25px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(34,158,217,.6);
}
</style>
</head>

<body>

<header>BLEEDBLUEARMY</header>

<div class="player-wrap">
  <video id="video" controls autoplay muted playsinline></video>
  <div class="watermark">@BLEEDBLUEARMY</div>
</div>

<div class="telegram">
  <a href="https://t.me/+_WN9XxoZT8QxZmI1" target="_blank">
    Join Telegram Channel
  </a>
</div>

<script>
const video = document.getElementById('video');

/* 🔴 PASTE YOUR M3U8 LINK BELOW */
const source = "https://freelivtvstrshare.vvishwas042.workers.dev/play.m3u8?id=333368"
  
if (Hls.isSupported()) {
  const hls = new Hls({
    maxBufferLength: 30,
    maxMaxBufferLength: 60,
    lowLatencyMode: true
  });
  hls.loadSource(source);
  hls.attachMedia(video);
} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
  video.src = source;
}
</script>

</body>
</html>
