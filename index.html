<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLEEDBLUEARMY</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0a1a3f, #001233);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        p {
            opacity: 0.85;
            margin-bottom: 25px;
        }

        .telegram-btn {
            display: inline-block;
            padding: 14px 26px;
            background: #229ED9;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            box-shadow: 0 0 15px rgba(34,158,217,0.6);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .telegram-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(34,158,217,0.9);
        }

        footer {
            position: absolute;
            bottom: 15px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BLEEDBLUEARMY</h1>
        <p>Official Telegram Channel • Cricket • Analysis • Emotions</p>

        <a class="telegram-btn"
           href="https://t.me/+_WN9XxoZT8QxZmI1"
           target="_blank">
            Join Telegram Channel
        </a>
    </div>

    <footer>
        © BLEEDBLUEARMY
    </footer>

</body>
</html>
