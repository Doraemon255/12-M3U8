header {

  padding: 12px;

  font-size: 18px;

.player-wrap {
  position: relative;
  width: 100%;
  background: black;
}

video {
  width: 100%;
  height: auto;
  background: black;
}

/* Watermark */
.watermark {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 12px;
  opacity: 0.7;
  background: rgba(0,0,0,0.6);
  padding: 5px 8px;
  border-radius: 6px;
}

/* Telegram Button */

}

.telegram a {

  color: white;
  padding: 10px 22px;
  border-radius: 25px;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(34,158,217,.6);
}
</style>
